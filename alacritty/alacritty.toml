[colors.primary]
background = "#181a1f"

[cursor]
blink_interval = 500
blink_timeout = 0
unfocused_hollow = true

[cursor.style]
blinking = "On"

[env]
TERM = "xterm-256color"

[font]
size = 15.5

[font.bold]
family = "JetBrainsMono Nerd Font Mono"
style = "SemiBold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font Mono"
style = "SemiBold Italic"

[font.italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Light Italic"

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Light"

[shell]
args = ["-l", "-c", "tmux attach || tmux"]
program = "/opt/homebrew/bin/fish"

[window]
blur = false
decorations = "buttonless"
dynamic_padding = true
opacity = 1
startup_mode = "Maximized"
